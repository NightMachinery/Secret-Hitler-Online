services:
  db:
    image: postgres:15
    container_name: sh-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-secret}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-secret}"
      POSTGRES_DB: "${POSTGRES_DB:-secrethitler}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secret} -d ${POSTGRES_DB:-secrethitler}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: gradle:8.6.0-jdk17
    container_name: sh-backend-prod
    restart: unless-stopped
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - gradle-cache:/home/gradle/.gradle
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://secret:secret@db:5432/secrethitler}"
      PORT: "${BACKEND_PORT:-4040}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://example.com:6666}"
    command: ["bash", "-lc", "./gradlew run"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4040}:${BACKEND_PORT:-4040}"

  frontend:
    image: node:18
    container_name: sh-frontend-prod
    restart: unless-stopped
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    environment:
      REACT_APP_SERVER_ADDRESS: "${REACT_APP_SERVER_ADDRESS:-example.com:4040}"
      REACT_APP_SERVER_ADDRESS_HTTP: "${REACT_APP_SERVER_ADDRESS_HTTP:-http://example.com:4040}"
      REACT_APP_WEBSOCKET_HEADER: "${REACT_APP_WEBSOCKET_HEADER:-ws://}"
      REACT_APP_CLIENT_ORIGIN: "${REACT_APP_CLIENT_ORIGIN:-http://example.com:6666}"
    command: bash -lc "npm ci && npm run build && npx --yes serve -s build -l ${FRONTEND_PORT:-6666}"
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-6666}:${FRONTEND_PORT:-6666}"

volumes:
  gradle-cache: {}
  postgres-data: {}
