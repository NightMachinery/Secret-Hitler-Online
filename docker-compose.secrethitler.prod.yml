services:
  db:
    image: postgres:15
    container_name: sh-postgres-secrethitler
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-secret}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-secret}"
      POSTGRES_DB: "${POSTGRES_DB:-secrethitler}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secret} -d ${POSTGRES_DB:-secrethitler}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: gradle:8.6.0-jdk17
    container_name: sh-backend-secrethitler
    restart: unless-stopped
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - gradle-cache:/home/gradle/.gradle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://secret:secret@db:5432/secrethitler}"
      PORT: "${BACKEND_PORT:-4040}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://secrethitler.pinky.lilf.ir}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,db,backend,frontend,host.docker.internal}"
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
      no_proxy: "${NO_PROXY:-localhost,127.0.0.1,db,backend,frontend,host.docker.internal}"
      GRADLE_OPTS: "${GRADLE_OPTS:-}"
    command: ["bash", "-lc", "./gradlew run"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4040}:${BACKEND_PORT:-4040}"

  frontend:
    image: node:18
    container_name: sh-frontend-secrethitler
    restart: unless-stopped
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - npm-cache:/root/.npm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      UNLOCK_ALL_P: "${UNLOCK_ALL_P:-true}"
      REACT_APP_UNLOCK_ALL_P: "${UNLOCK_ALL_P:-true}"
      REACT_APP_SERVER_ADDRESS: "${REACT_APP_SERVER_ADDRESS:-secrethitler.pinky.lilf.ir}"
      REACT_APP_SERVER_ADDRESS_HTTP: "${REACT_APP_SERVER_ADDRESS_HTTP:-https://secrethitler.pinky.lilf.ir}"
      REACT_APP_WEBSOCKET_HEADER: "${REACT_APP_WEBSOCKET_HEADER:-wss://}"
      REACT_APP_CLIENT_ORIGIN: "${REACT_APP_CLIENT_ORIGIN:-https://secrethitler.pinky.lilf.ir}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,db,backend,frontend,host.docker.internal}"
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
      no_proxy: "${NO_PROXY:-localhost,127.0.0.1,db,backend,frontend,host.docker.internal}"
      NPM_CONFIG_PROXY: "${HTTP_PROXY:-}"
      NPM_CONFIG_HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NPM_CONFIG_FETCH_RETRIES: "${NPM_CONFIG_FETCH_RETRIES:-5}"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "${NPM_CONFIG_FETCH_RETRY_MINTIMEOUT:-20000}"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "${NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT:-120000}"
    command: bash -lc "npm ci --verbose && npm run build && npx --yes serve -s build -l ${FRONTEND_PORT:-6010}"
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-6010}:${FRONTEND_PORT:-6010}"

volumes:
  gradle-cache: {}
  npm-cache: {}
  postgres-data: {}
